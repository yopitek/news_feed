<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Daily Multilingual News Digest - 中文、English、日本語">
    <title>每日電子新聞報 | {{DATE_DISPLAY}}</title>

    <meta property="og:title" content="每日電子新聞報 | {{DATE_DISPLAY}}">
    <meta property="og:description" content="每日精選中文、英文、日文新聞摘要，AI 自動生成。">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://zennote.app/news_feed/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="每日電子新聞報 | {{DATE_DISPLAY}}">
    <meta name="twitter:description" content="每日精選中文、英文、日文新聞摘要。">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #f3efe6;
            color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", "Noto Sans JP", sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        a {
            color: #0f5499;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #1a1a1a;
            text-decoration: underline;
        }

        a:visited {
            color: #6f5f70;
        }

        a:focus-visible,
        button:focus-visible {
            outline: 3px solid #b58a00;
            outline-offset: 3px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .card {
            background-color: #fffdf7;
            border: 1px solid #e6e1d6;
        }

        .masthead {
            padding: 24px 28px;
            border-bottom: 3px solid #1a1a1a;
        }

        .masthead-title {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .masthead-subtitle {
            font-size: 0.875rem;
            color: #666666;
            margin-top: 6px;
        }

        .tab-nav {
            display: flex;
            border-bottom: 1px solid #e6e1d6;
            background-color: #fffdf7;
            overflow-x: auto;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 0 rgba(26, 26, 26, 0.08);
            scrollbar-width: thin;
        }

        .tab-btn {
            flex: 1;
            min-width: 100px;
            padding: 14px 24px;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1rem;
            font-weight: 400;
            color: #666666;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: #1a1a1a;
            background-color: #faf8f2;
        }

        .tab-btn.active {
            color: #1a1a1a;
            border-bottom-color: #1a1a1a;
            font-weight: 600;
        }

        .tab-content {
            display: none;
            padding: 20px 28px;
        }

        .tab-content.active {
            display: block;
        }

        .section-header {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0 0 16px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #1a1a1a;
        }

        /* Category Section Styles */
        .category-section {
            margin-bottom: 28px;
        }

        .category-header {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1rem;
            font-weight: 600;
            color: #1a1a1a;
            background-color: transparent;
            border-left: 4px solid #8b1e3f;
            padding: 4px 0 4px 12px;
            margin: 24px 0 14px 0;
        }

        .category-section:first-child .category-header {
            margin-top: 0;
        }

        .category-news-list {
            padding-left: 0;
        }

        /* News Item Styles */
        .news-item {
            border-radius: 6px;
            cursor: pointer;
            margin: 0 -10px;
            padding: 16px 10px;
            border-bottom: 1px dotted #d9d2c4;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .news-item:hover {
            background-color: #faf8f2;
            transform: translateX(2px);
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-item-title {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1.12rem;
            font-weight: 600;
            line-height: 1.4;
            margin: 0 0 8px 0;
        }

        .news-item-title a {
            color: #1a1a1a;
        }

        .news-item-title a:hover {
            color: #0f5499;
        }

        .news-item-meta {
            font-size: 0.8rem;
            color: #666666;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 10px;
            margin-bottom: 10px;
        }

        .news-item-meta .source {
            font-weight: 500;
        }

        .news-item-meta .date {
            color: #999999;
        }

        .news-item-summary {
            font-size: 0.9rem;
            color: #333333;
            line-height: 1.65;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 4;
            overflow: hidden;
        }

        .source-panel {
            margin: 0 0 22px 0;
            padding: 14px 0 16px 0;
            border-bottom: 1px solid #e6e1d6;
        }

        .source-panel-title {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .source-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            list-style: none;
        }

        .source-list li {
            border: 1px solid #e0d7c8;
            border-radius: 999px;
            color: #4d463d;
            font-size: 0.78rem;
            line-height: 1.2;
            padding: 5px 9px;
        }

        .source-status {
            color: #7a6f62;
            font-size: 0.78rem;
            margin-top: 10px;
        }

        .no-news {
            color: #666666;
            font-style: italic;
            padding: 20px 0;
        }

        .footer {
            padding: 20px 28px;
            border-top: 1px solid #e6e1d6;
            background-color: #faf8f2;
        }

        .footer p {
            font-size: 0.8rem;
            color: #666666;
            margin: 0;
        }

        .footer .small {
            font-size: 0.75rem;
            color: #999999;
            margin-top: 4px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 12px 8px;
            }

            .masthead {
                padding: 16px 14px;
            }

            .masthead-title {
                font-size: 1.4rem;
            }

            .tab-btn {
                padding: 10px 12px;
                font-size: 0.85rem;
            }

            .tab-nav {
                mask-image: linear-gradient(90deg, transparent 0, #000 18px, #000 calc(100% - 18px), transparent 100%);
            }

            .tab-content {
                padding: 14px 12px;
            }

            .category-header {
                font-size: 1rem;
                padding: 3px 0 3px 10px;
            }

            .news-item-title {
                font-size: 1rem;
            }

            .news-item-summary {
                font-size: 0.85rem;
                -webkit-line-clamp: 5;
            }
        }

        .back-to-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #1a1a1a;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 1000;
        }

        .back-to-top:hover {
            background-color: #990f3d;
            transform: translateY(-2px);
        }

        .back-to-top.visible {
            display: flex;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <header class="masthead">
                <h1 class="masthead-title">每日電子新聞報</h1>
                <p class="masthead-subtitle">{{DATE_DISPLAY}}</p>
            </header>

            <nav class="tab-nav" role="tablist">
                <button id="tab-zh-news" class="tab-btn active" role="tab" aria-selected="true" aria-controls="zh-news" data-tab="zh-news">中文新聞</button>
                <button id="tab-en-news" class="tab-btn" role="tab" aria-selected="false" aria-controls="en-news" data-tab="en-news">English News</button>
                <button id="tab-ja-news" class="tab-btn" role="tab" aria-selected="false" aria-controls="ja-news" data-tab="ja-news">日本語ニュース</button>
                <button id="tab-tech-blogs" class="tab-btn" role="tab" aria-selected="false" aria-controls="tech-blogs" data-tab="tech-blogs">Tech Blogs</button>
            </nav>

            <section class="tab-content active" id="zh-news" role="tabpanel" aria-labelledby="tab-zh-news">
                <h2 class="section-header">中文新聞</h2>
                {{ZH_NEWS_ITEMS}}
            </section>

            <template id="en-news-template">
                <h2 class="section-header">English News</h2>
                {{EN_NEWS_ITEMS}}
            </template>
            <section class="tab-content" id="en-news" role="tabpanel" aria-labelledby="tab-en-news">
                <!-- Content loaded lazily -->
            </section>

            <template id="ja-news-template">
                <h2 class="section-header">日本語ニュース</h2>
                {{JA_NEWS_ITEMS}}
            </template>
            <section class="tab-content" id="ja-news" role="tabpanel" aria-labelledby="tab-ja-news">
                <!-- Content loaded lazily -->
            </section>

            <template id="tech-blogs-template">
                <h2 class="section-header">Tech Blogs</h2>
                {{TECH_BLOGS_SOURCES}}
                {{TECH_BLOGS_ITEMS}}
            </template>
            <section class="tab-content" id="tech-blogs" role="tabpanel" aria-labelledby="tab-tech-blogs">
                <!-- Content loaded lazily -->
            </section>

            <footer class="footer">
                <p>{{PIPELINE_STATUS}}</p>
                <p class="small">RSS-first pipeline powered by AI summarization. All links open original articles.</p>
            </footer>
        </div>
    </div>

    <button class="back-to-top" id="back-to-top" title="回到頂端" aria-label="回到頂端">↑</button>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const tabButtons = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');
            const tabNav = document.querySelector('.tab-nav');
            const loadedTabs = new Set(['zh-news']);

            function loadTabContent(tabId) {
                if (loadedTabs.has(tabId)) return;
                var template = document.getElementById(tabId + '-template');
                var panel = document.getElementById(tabId);
                if (template && panel) {
                    var content = template.content.cloneNode(true);
                    panel.innerHTML = '';
                    panel.appendChild(content);
                    loadedTabs.add(tabId);
                }
            }

            function activateTab(targetTab, options) {
                options = options || {};
                tabButtons.forEach(function (btn) {
                    btn.classList.remove('active');
                    btn.setAttribute('aria-selected', 'false');
                    btn.setAttribute('tabindex', '-1');
                });

                tabContents.forEach(function (content) {
                    content.classList.remove('active');
                });

                loadTabContent(targetTab);

                var activeBtn = document.querySelector('[data-tab="' + targetTab + '"]');
                if (activeBtn) {
                    activeBtn.classList.add('active');
                    activeBtn.setAttribute('aria-selected', 'true');
                    activeBtn.setAttribute('tabindex', '0');
                    activeBtn.focus();
                }

                var panel = document.getElementById(targetTab);
                if (panel) {
                    panel.classList.add('active');
                }

                if (window.location.hash.replace('#', '') !== targetTab) {
                    history.replaceState(null, '', '#' + targetTab);
                }

                if (options.scroll !== false) {
                    var cardTop = document.querySelector('.card').getBoundingClientRect().top + window.scrollY;
                    window.scrollTo({ top: Math.max(0, cardTop), behavior: 'smooth' });
                }
            }

            tabButtons.forEach(function (button) {
                button.addEventListener('click', function () {
                    activateTab(this.getAttribute('data-tab'));
                });
            });

            document.addEventListener('click', function (e) {
                var item = e.target.closest('.news-item');
                if (!item || e.target.closest('a')) return;
                var link = item.getAttribute('data-link');
                if (link) {
                    window.open(link, '_blank', 'noopener,noreferrer');
                }
            });

            tabNav.addEventListener('keydown', function (e) {
                var current = document.activeElement;
                if (!current || !current.classList.contains('tab-btn')) return;

                var buttons = Array.from(tabButtons);
                var idx = buttons.indexOf(current);

                switch (e.key) {
                    case 'ArrowRight':
                        e.preventDefault();
                        idx = (idx + 1) % buttons.length;
                        activateTab(buttons[idx].getAttribute('data-tab'), { scroll: false });
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        idx = (idx - 1 + buttons.length) % buttons.length;
                        activateTab(buttons[idx].getAttribute('data-tab'), { scroll: false });
                        break;
                    case 'Home':
                        e.preventDefault();
                        activateTab(buttons[0].getAttribute('data-tab'), { scroll: false });
                        break;
                    case 'End':
                        e.preventDefault();
                        activateTab(buttons[buttons.length - 1].getAttribute('data-tab'), { scroll: false });
                        break;
                }
            });

            var initialTab = window.location.hash.replace('#', '');
            if (initialTab && document.querySelector('[data-tab="' + initialTab + '"]')) {
                activateTab(initialTab, { scroll: false });
            } else {
                history.replaceState(null, '', '#zh-news');
            }

            var backToTop = document.getElementById('back-to-top');
            window.addEventListener('scroll', function () {
                if (window.scrollY > 300) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            });

            backToTop.addEventListener('click', function () {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    </script>
</body>

</html>
